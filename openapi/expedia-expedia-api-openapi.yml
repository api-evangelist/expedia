openapi: 3.1.0
info:
  title: Expedia Developer API
  description: >-
    Expedia Group provides APIs for hotel, flight, and vacation rental bookings, as well as property management and affiliate marketing. The Rapid API enables partners to access Expedia's travel inventory.
  version: '1.0'
  contact:
    name: Expedia Developer Support
    url: https://developers.expediagroup.com/
externalDocs:
  description: Documentation
  url: https://developers.expediagroup.com/
servers:
  - url: https://developers.expediagroup.com
    description: Production
tags:
  - name: Travel
    description: Travel operations
security:
  - bearerAuth: []
paths:
  /status:
    get:
      operationId: getStatus
      summary: Get API status
      description: >-
        Returns the current status of the API.
      tags:
        - Travel
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  version:
                    type: string
        '401':
          description: Unauthorized
        '429':
          description: Too many requests
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
